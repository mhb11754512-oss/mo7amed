<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Results</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 1em;
        }
        .result {
            margin: 20px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .correct {
            background-color: #c8e6c9;
            color: #388e3c;
        }
        .incorrect {
            background-color: #ffebee;
            color: #d32f2f;
        }
    </style>
</head>
<body>
    <h1>Quiz Results</h1>
    <div id="results"></div>
    <script>
        const userAnswers = ["B", "A", "D", "C"]; // User's answers
        const correctAnswers = ["A", "B", "D", "C"]; // Correct answers
        const resultsDiv = document.getElementById('results');

        function displayResults() {
            userAnswers.forEach((answer, index) => {
                const result = document.createElement('div');
                result.classList.add('result');
                if (answer === correctAnswers[index]) {
                    result.classList.add('correct');
                    result.innerText = `Question ${index + 1}: Your answer ${answer} is correct!`;
                } else {
                    result.classList.add('incorrect');
                    result.innerText = `Question ${index + 1}: Your answer ${answer} is incorrect! Correct answer was ${correctAnswers[index]}.`;
                }
                resultsDiv.appendChild(result);
            });
        }

        displayResults();
    </script>
</body>
</html>
